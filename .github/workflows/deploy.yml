name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Deploy backend ────────────────────────────────────────────────────────
  # Replace the steps below with your target platform (Railway / Render / Fly.io / VPS SSH).
  # Required secrets to add in GitHub → Settings → Secrets and variables → Actions:
  #   DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY  (for SSH-based VPS deployment)
  #   RENDER_DEPLOY_HOOK                    (for Render)
  #   RAILWAY_TOKEN                         (for Railway)
  #
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: build-frontend
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Render (uncomment and add RENDER_DEPLOY_HOOK secret) ──────────────
      # - name: Trigger Render deploy
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # ── Railway (uncomment and add RAILWAY_TOKEN secret) ──────────────────
      # - name: Install Railway CLI
      #   run: npm install -g @railway/cli
      # - name: Deploy to Railway
      #   run: railway up --service backend
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # ── VPS via SSH (uncomment and add DEPLOY_HOST/USER/KEY secrets) ──────
      # - name: Deploy to VPS
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host:     ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key:      ${{ secrets.DEPLOY_KEY }}
      #     script: |
      #       cd /srv/wcs-full/backend
      #       git pull origin main
      #       npm ci --omit=dev
      #       pm2 restart wcs-backend || pm2 start src/server.js --name wcs-backend

      - name: Deployment placeholder
        run: |
          echo "✅ CI passed. Add your deployment target to .github/workflows/deploy.yml"
          echo "   and configure the required secrets in GitHub → Settings → Secrets."

  # ── Deploy frontend ───────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    environment: production

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      # ── Netlify (uncomment and add NETLIFY_AUTH_TOKEN + NETLIFY_SITE_ID) ──
      # - uses: nwtgck/actions-netlify@v3
      #   with:
      #     publish-dir: dist
      #     production-branch: main
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}

      # ── Vercel (uncomment and add VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID) ──
      # - run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --prod dist

      - name: Deployment placeholder
        run: |
          echo "Frontend dist built ($(du -sh dist | cut -f1))."
          echo "Uncomment your hosting target above and add secrets."
