name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. CI gate — must pass before deploy ─────────────────────────────────
  ci-gate:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── 2. Deploy to Render ───────────────────────────────────────────────────
  deploy:
    name: Deploy → worldclassscholars.onrender.com
    runs-on: ubuntu-latest
    needs: ci-gate
    environment:
      name: production
      url: https://worldclassscholars.onrender.com

    steps:
      - name: Trigger Render deploy
        # Add RENDER_DEPLOY_HOOK secret in:
        # GitHub → Settings → Secrets and variables → Actions → New repository secret
        # Get the hook URL from: Render dashboard → your service → Settings → Deploy Hook
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Triggering Render deploy..."
            curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
              && echo "✅ Render deploy triggered" \
              || echo "⚠️  Render hook call failed"
          else
            echo "ℹ️  RENDER_DEPLOY_HOOK secret not set yet."
            echo "   1. Create your service on https://render.com using render.yaml"
            echo "   2. Copy the Deploy Hook URL from Render → Settings → Deploy Hook"
            echo "   3. Add it as RENDER_DEPLOY_HOOK in GitHub → Settings → Secrets"
          fi

      - name: Summary
        run: |
          echo "### 🚀 Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://worldclassscholars.onrender.com |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
