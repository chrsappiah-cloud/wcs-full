name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:    # allows deploy.yml to call this as a gate

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — install & smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    env:
      PORT: 3001
      MONGODB_URI: mongodb://127.0.0.1:27017
      MONGODB_NS: wcs_ci
      OPEN_LIBRARY_BASE: https://openlibrary.org
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1h

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Seed database
        run: npm run seed

      - name: Start server and verify health endpoint
        run: |
          npm run dev &
          SERVER_PID=$!
          echo "Waiting for server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3001/health; then
              echo "Server is up"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/api/v1/platform | grep -q "World Class Scholars"
          echo "Platform endpoint OK"
          curl -sf "http://localhost:3001/api/v1/library/search?q=open&source=internal" | grep -q "query"
          echo "Library search OK"
          kill $SERVER_PID
